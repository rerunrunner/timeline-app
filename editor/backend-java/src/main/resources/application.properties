# Data directory: set TIMELINE_DATA_DIR env (e.g. ../../../runner-data when run from editor/). If unset, uses ./data
timeline.data.path=${TIMELINE_DATA_DIR:./data}

# H2 Database Configuration (in-memory; data persisted via flyway_dump on metadata update)
spring.datasource.url=jdbc:h2:mem:narrative;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=5001

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Flyway Configuration (schema from classpath, data from data dir)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,filesystem:${timeline.data.path}/flyway_dump
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Logging Configuration
#logging.level.com.timeline.editor=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
